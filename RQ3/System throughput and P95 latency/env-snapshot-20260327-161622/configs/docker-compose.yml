    entrypoint: ["java", "-jar", "app.jar"]
    command: ["deploy", "all"]

  cadvisor:
    image: ${CADVISOR_IMAGE:-registry.cn-hangzhou.aliyuncs.com/google_containers/cadvisor:v0.47.2}
    container_name: oracle-cadvisor
    ports:
